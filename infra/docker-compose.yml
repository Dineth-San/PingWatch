version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pingwatch
      POSTGRES_USER: ping
      POSTGRES_PASSWORD: watch
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://ping:watch@postgres:5432/pingwatch?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://ping:watch@postgres:5432/pingwatch?sslmode=disable
    depends_on:
      - postgres

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
