apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pingwatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: IMAGE_TAG_FRONTEND
          ports:
            - containerPort: 3000
          # NEXT_PUBLIC_API_URL is baked into the image at build time — see build-frontend
          # in .github/workflows/deploy.yml. Set it as a GitHub secret named NEXT_PUBLIC_API_URL
          # pointing to the API LoadBalancer URL (get it after first deploy: kubectl get svc api -n pingwatch).
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pingwatch
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
