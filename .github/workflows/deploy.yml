name: CI/CD

on:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            api/go.sum
            worker/go.sum

      - name: Test API
        working-directory: api
        run: go test ./...

      - name: Test Worker
        working-directory: worker
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  build-api:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/pingwatch-api:${{ github.sha }}
          docker build -t $IMAGE api/
          docker push $IMAGE

  build-worker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/pingwatch-worker:${{ github.sha }}
          docker build -t $IMAGE worker/
          docker push $IMAGE

  build-frontend:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/pingwatch-frontend:${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t $IMAGE frontend/
          docker push $IMAGE

  deploy:
    needs: [build-api, build-worker, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Stamp image tags into manifests
        run: |
          sed -i "s|IMAGE_TAG_API|${{ secrets.ECR_REGISTRY }}/pingwatch-api:${{ github.sha }}|g"         infra/k8s/api-deployment.yaml
          sed -i "s|IMAGE_TAG_WORKER|${{ secrets.ECR_REGISTRY }}/pingwatch-worker:${{ github.sha }}|g"   infra/k8s/worker-deployment.yaml
          sed -i "s|IMAGE_TAG_FRONTEND|${{ secrets.ECR_REGISTRY }}/pingwatch-frontend:${{ github.sha }}|g" infra/k8s/frontend-deployment.yaml

      - name: Apply manifests
        run: kubectl apply -f infra/k8s/
